<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Semporna Area Map</title>
  <desc id="desc">Schematic map showing Tawau Airport, Semporna town, and nearby island directions including Mabul, Kapalai, Mataking, Pom Pom, and Sipadan.</desc>
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff4f0"/>
      <stop offset="1" stop-color="#9ed9df"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf7ef"/>
      <stop offset="1" stop-color="#c9e5d3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#123028" flood-opacity="0.16"/>
    </filter>
    <style>
      .label{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#17211f}
      .small{font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#4f615c}
      .tiny{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0a4f4b}
      .route{fill:none;stroke:#0f766e;stroke-width:4;stroke-linecap:round;stroke-dasharray:10 12;opacity:.82}
      .boat{fill:none;stroke:#3f82bf;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10;opacity:.75}
      .pin{fill:#df6b5d;stroke:#fff;stroke-width:5}
      .island{fill:#fff8dc;stroke:#d6b46b;stroke-width:3}
    </style>
  </defs>
  <rect width="1180" height="520" rx="0" fill="url(#sea)"/>
  <path d="M0 0h650c-24 34-63 69-113 92-68 32-100 73-111 129-14 72 19 111 1 168-20 66-91 89-151 131H0z" fill="url(#land)"/>
  <path d="M0 416c72-20 128-54 184-52 71 2 97 55 166 45 42-6 61-33 77-69 7 50-2 84-34 111-38 32-84 47-117 69H0z" fill="#b9dcc7" opacity=".72"/>
  <path d="M486 107c52 34 88 85 99 145 11 62-10 120-55 162" fill="none" stroke="#9ec9af" stroke-width="18" stroke-linecap="round" opacity=".65"/>
  <path class="route" d="M176 205C263 203 348 215 451 281"/>
  <path class="boat" d="M451 281C555 308 646 337 768 360"/>
  <path class="boat" d="M451 281C575 259 681 245 830 225"/>
  <path class="boat" d="M451 281C590 197 706 164 873 129"/>
  <path class="boat" d="M451 281C548 377 638 424 754 458"/>

  <g filter="url(#shadow)">
    <circle class="pin" cx="176" cy="205" r="15"/>
    <circle class="pin" cx="451" cy="281" r="18"/>
    <ellipse class="island" cx="768" cy="360" rx="54" ry="23" transform="rotate(-12 768 360)"/>
    <ellipse class="island" cx="830" cy="225" rx="42" ry="18" transform="rotate(-18 830 225)"/>
    <ellipse class="island" cx="873" cy="129" rx="58" ry="22" transform="rotate(-8 873 129)"/>
    <ellipse class="island" cx="754" cy="458" rx="46" ry="18" transform="rotate(11 754 458)"/>
    <ellipse class="island" cx="956" cy="403" rx="52" ry="20" transform="rotate(-15 956 403)"/>
    <ellipse class="island" cx="1001" cy="260" rx="42" ry="16" transform="rotate(18 1001 260)"/>
  </g>

  <g>
    <text class="label" x="64" y="58">Sabah East Coast</text>
    <text class="small" x="64" y="84">Tawau Airport to Semporna town, then boat to islands</text>
    <text class="label" x="63" y="200">Tawau Airport</text>
    <text class="small" x="65" y="224">1.5-2h by car</text>
    <text class="label" x="475" y="274">Semporna Town</text>
    <text class="small" x="475" y="298">main jetty / hotel buffer</text>
    <text class="tiny" x="706" y="348">Mabul</text>
    <text class="tiny" x="806" y="215">Kapalai</text>
    <text class="tiny" x="851" y="119">Mataking</text>
    <text class="tiny" x="699" y="452">Sipadan</text>
    <text class="tiny" x="914" y="394">Pom Pom</text>
    <text class="tiny" x="956" y="250">Tun Sakaran</text>
  </g>

  <g transform="translate(64 446)">
    <rect width="330" height="48" rx="8" fill="#ffffff" opacity=".9"/>
    <circle cx="23" cy="24" r="7" fill="#df6b5d"/>
    <text class="small" x="42" y="29">Airport / town</text>
    <line x1="156" y1="24" x2="220" y2="24" class="boat"/>
    <text class="small" x="235" y="29">Boat route</text>
  </g>
</svg>
